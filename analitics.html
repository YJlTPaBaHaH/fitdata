<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FITDATA — Analitics</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/base/reset.css">
  <link rel="stylesheet" href="css/base/variables.css">
  <link rel="stylesheet" href="css/base/typography.css">
  <link rel="stylesheet" href="css/base/global.css">

  <link rel="stylesheet" href="css/layout/header.css">
  <link rel="stylesheet" href="css/pages/analytics.css">
</head>
<body>
  <div class="page analitics-page">
    <header class="header">
      <a href="index.html" class="header__logo" aria-label="FITDATA">
        <img src="assets/logo/logo.png" alt="FITDATA" class="header__logo-image">
      </a>

      <nav class="header__nav" aria-label="Основная навигация">
        <a href="index.html" class="header__link">Главная</a>
        <a href="workouts.html" class="header__link header__link--active">Владислав</a>
      </nav>
    </header>

    <main class="analitics">
      <div class="analitics__container">
        <section class="analitics-periods" aria-label="Периоды аналитики">
          <button class="analitics-periods__item" type="button">7 дней</button>
          <button class="analitics-periods__item analitics-periods__item--active" type="button">30 дней</button>
          <button class="analitics-periods__item" type="button">3 месяца</button>
          <button class="analitics-periods__item" type="button">Весь период</button>
        </section>

        <section class="analitics-layout">
          <div class="analitics-layout__main">
            <section class="analitics-chart-card">
              <div class="analitics-chart-card__header">
                <h1 class="analitics-chart-card__title" id="analiticsExerciseTitle">Упражнение</h1>
              </div>

              <div class="analitics-chart-card__body">
                <div class="analitics-chart-placeholder">
                  <span class="analitics-chart-placeholder__text">График будет добавлен позже</span>
                </div>
              </div>
            </section>

            <section class="analitics-history-card">
              <div class="analitics-history-card__header">
                <h2 class="analitics-history-card__title">История упражнений</h2>
              </div>

              <div class="analitics-history-table">
                <div class="analitics-history-table__row analitics-history-table__row--head">
                  <span>Дата</span>
                  <span>Вес</span>
                  <span>Повторения</span>
                  <span></span>
                </div>

                <div id="analiticsHistoryRows"></div>
              </div>
            </section>
          </div>

          <aside class="analitics-layout__sidebar">
            <section class="analitics-forecast-card">
              <h2 class="analitics-forecast-card__title">Аналитический прогноз</h2>

              <div class="analitics-forecast-card__content" id="analiticsForecastContent">
                <p class="analitics-forecast-card__text">
                  Для данного упражнения пока недостаточно данных для расширенного прогноза.
                </p>

                <div class="analitics-forecast-card__stats">
                  <div class="analitics-forecast-card__stat">
                    <span class="analitics-forecast-card__label">Последний результат</span>
                    <span class="analitics-forecast-card__value" id="analiticsLastResult">—</span>
                  </div>

                  <div class="analitics-forecast-card__stat">
                    <span class="analitics-forecast-card__label">Лучший результат</span>
                    <span class="analitics-forecast-card__value" id="analiticsBestResult">—</span>
                  </div>

                  <div class="analitics-forecast-card__stat">
                    <span class="analitics-forecast-card__label">Объём</span>
                    <span class="analitics-forecast-card__value" id="analiticsVolume">—</span>
                  </div>
                </div>
              </div>
            </section>

            <button class="analitics__add-button" type="button" id="openAnaliticsModal">
              Добавить упражнение
            </button>
          </aside>
        </section>
      </div>
    </main>

    <div class="analitics-modal" id="analiticsModal" aria-hidden="true">
      <div class="analitics-modal__backdrop" id="closeAnaliticsModal"></div>

      <div class="analitics-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="analiticsModalTitle">
        <h2 class="analitics-modal__title" id="analiticsModalTitle">Добавить упражнение</h2>

        <form class="analitics-form" id="analiticsForm">
          <div class="analitics-form__field">
            <input
              class="analitics-form__input"
              type="number"
              id="analiticsWeight"
              name="weight"
              placeholder="Вес"
              min="0"
              step="0.5"
              required
              autocomplete="off"
            >
          </div>

          <div class="analitics-form__field">
            <input
              class="analitics-form__input"
              type="number"
              id="analiticsReps"
              name="reps"
              placeholder="Повторы"
              min="1"
              step="1"
              required
              autocomplete="off"
            >
          </div>

          <div class="analitics-form__actions">
            <button class="analitics-form__cancel" type="button" id="cancelAnaliticsModal">
              Отмена
            </button>

            <button class="analitics-form__submit" type="submit">
              Добавить
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/pages/analytics.js"></script>
</body>
</html>
