<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FITDATA — Регистрация</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/base/reset.css">
  <link rel="stylesheet" href="css/base/variables.css">
  <link rel="stylesheet" href="css/base/typography.css">
  <link rel="stylesheet" href="css/base/global.css">

  <link rel="stylesheet" href="css/components/buttons.css">
  <link rel="stylesheet" href="css/components/forms.css">

  <link rel="stylesheet" href="css/layout/header.css">
  <link rel="stylesheet" href="css/pages/register.css">
</head>
<body>
  <div class="page register-page">
    <header class="header">
      <a href="index.html" class="header__logo" aria-label="FITDATA">
        <img src="assets/logo/logo.png" alt="FITDATA" class="header__logo-image">
      </a>

      <nav class="header__nav" aria-label="Основная навигация">
        <a href="index.html" class="header__link header__link--active">Главная</a>
      </nav>
    </header>

    <main class="page__content">
      <section class="register">
        <div class="register__card">
          <h1 class="register__title">Регистрация</h1>

          <form class="register__form" action="#" method="post">
            <input
              class="register__input"
              type="email"
              name="email"
              placeholder="Почта"
              aria-label="Почта"
            >

            <input
              class="register__input"
              type="password"
              name="password"
              placeholder="Пароль"
              aria-label="Пароль"
            >

            <input
              class="register__input"
              type="password"
              name="password_repeat"
              placeholder="Повторите пароль"
              aria-label="Повторите пароль"
            >

            <div class="register__footer">
              <p class="register__text">Есть аккаунт?</p>
              <a href="login.html" class="register__login-link">Войти</a>
            </div>
          </form>
        </div>

        <button type="submit" class="register__submit">
          Зарегистрироваться
        </button>
      </section>
    </main>
  </div>
</body>
</html>
