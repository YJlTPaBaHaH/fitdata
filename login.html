<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FITDATA — Вход</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/base/reset.css">
  <link rel="stylesheet" href="css/base/variables.css">
  <link rel="stylesheet" href="css/base/typography.css">
  <link rel="stylesheet" href="css/base/global.css">

  <link rel="stylesheet" href="css/components/buttons.css">
  <link rel="stylesheet" href="css/components/forms.css">

  <link rel="stylesheet" href="css/layout/header.css">
  <link rel="stylesheet" href="css/pages/auth.css">
</head>
<body>
  <div class="page login-page">
    <header class="header">
      <a href="index.html" class="header__logo" aria-label="FITDATA">
        <img src="assets/logo/logo.png" alt="FITDATA" class="header__logo-image">
      </a>

      <nav class="header__nav" aria-label="Основная навигация">
        <a href="index.html" class="header__link">Главная</a>
        <a href="login.html" class="header__link header__link--active">Вход / Регистрация</a>
      </nav>
    </header>

    <main class="page__content">
      <section class="login">
        <div class="login__card">
          <h1 class="login__title">Вход</h1>

          <form class="form login__form" action="#" method="post">
            <div class="form__group">
              <input
                class="form__control login__control"
                type="email"
                name="email"
                placeholder="Почта"
                aria-label="Почта"
              >
            </div>

            <div class="form__group">
              <input
                class="form__control login__control"
                type="password"
                name="password"
                placeholder="Пароль"
                aria-label="Пароль"
              >
            </div>

            <div class="login__footer">
              <p class="login__text">Нет аккаунта? -</p>
              <a href="register.html" class="login__register-link">Зарегистрироваться</a>
            </div>

            <button class="login__submit" type="submit">Войти</button>
          </form>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
